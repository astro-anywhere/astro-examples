      <stop offset='0%' stop-color='#5D8057'/>
      <stop offset='100%' stop-color='#7BA075'/>
    </linearGradient>
    <linearGradient id='g-moderate' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#B2986E'/>
      <stop offset='100%' stop-color='#C8AE84'/>
    </linearGradient>
    <linearGradient id='g-weak' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#A86464'/>
      <stop offset='100%' stop-color='#BE7A7A'/>
    </linearGradient>
  </defs>
  <style>
    .bg { fill: #FAF8F5; }
    .title { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 16px; font-weight: 600; fill: #3A3A3A; }
    .sub { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 11px; fill: #3A3A3A; }
    .head { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 14px; fill: #3A3A3A; font-weight: 600; }
    .power-name { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 14px; fill: #3A3A3A; font-weight: 600; }
    .traj { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 20px; font-weight: 700; }
    .durability { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 12px; fill: #3A3A3A; }
    .bar-bg { fill: #f0ede8; rx: 12; }
    .bar-fill.none { fill: #d8d4d0; rx: 12; }
    .bar-fill.weak { fill: url(#g-weak); rx: 12; }
    .bar-fill.moderate { fill: url(#g-moderate); rx: 12; }
    .bar-fill.strong { fill: url(#g-strong); rx: 12; }
    .legend { font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; font-size: 12px; fill: #3A3A3A; }
