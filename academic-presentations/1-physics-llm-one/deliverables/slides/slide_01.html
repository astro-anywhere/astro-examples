<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    background: #FAF8F5;
    color: #3A3A3A;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 60px 100px;
  }
  h1 {
    font-size: 40px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
    color: #3A3A3A;
  }
  .subtitle {
    font-size: 26px;
    font-weight: 400;
    color: #8FA8B8;
    margin-bottom: 24px;
    font-style: italic;
  }
  .authors {
    font-size: 22px;
    color: #8FA8B8;
    margin-bottom: 12px;
  }
  .affiliation {
    font-size: 18px;
    color: #A8B8A0;
    margin-bottom: 6px;
  }
  .venue {
    font-size: 18px;
    color: #C4A882;
    margin-top: 10px;
    font-weight: 600;
  }
  .accent-line {
    width: 80px;
    height: 3px;
    background: #C4A882;
    margin: 20px auto;
  }
  .series-tag {
    font-size: 15px;
    color: #A8B8A0;
    margin-top: 16px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="series-tag">Physics of Language Models</div>
  <h1>Part 1: Learning Hierarchical<br>Language Structures</h1>
  <div class="accent-line"></div>
  <p class="subtitle">How Transformers Learn to Parse by Implementing Dynamic Programming</p>
  <p class="authors">Zeyuan Allen-Zhu &nbsp;&middot;&nbsp; Yuanzhi Li</p>
  <p class="affiliation">Meta / FAIR Labs &nbsp;&middot;&nbsp; Mohamed bin Zayed University of AI</p>
  <p class="venue">ICML 2024</p>
</body>
</html>
