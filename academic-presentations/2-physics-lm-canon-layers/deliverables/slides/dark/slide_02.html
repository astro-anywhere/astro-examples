<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    background: #2A2A2E;
    color: #E8E4E0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 60px 100px;
  }
  h1 {
    font-size: 52px;
    font-weight: 700;
    color: #E8E4E0;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 24px;
    color: #9FB8C8;
    font-style: italic;
  }
  .section-number {
    font-size: 120px;
    font-weight: 700;
    color: #D4B892;
    opacity: 0.15;
    position: absolute;
    top: 40px;
    right: 80px;
  }
</style>
</head>
<body>
  <span class="section-number">01</span>
  <h1>The Challenge</h1>
  <p class="subtitle">Why comparing architectures is harder than you think</p>
</body>
</html>
